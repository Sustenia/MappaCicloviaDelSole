    map.on('load', function() {
      map.addSource('ciclovia', {
        type: 'geojson',
        data: { type: 'Feature', geometry: { type: 'MultiLineString', coordinates: gpxSegments } }
      });
      map.addLayer({
        id: 'ciclovia-outline', type: 'line', source: 'ciclovia',
        layout: { 'line-join': 'round', 'line-cap': 'round' },
        paint: { 'line-color': '#ffffff', 'line-width': 8, 'line-opacity': 1 }
      });
      map.addLayer({
        id: 'ciclovia-line', type: 'line', source: 'ciclovia',
        layout: { 'line-join': 'round', 'line-cap': 'butt' },
        paint: { 'line-color': '#F5A800', 'line-width': 5, 'line-opacity': 1, 'line-dasharray': [2, 2.5] }
      });

      points.forEach(function(p) {
        var el = document.createElement('div');
        var isPorta = p.tipo === 'Punto storico';
        if (isPorta) {
          el.innerHTML = '<div class="marker-wrapper"><div class="marker-pin" style="background:' + p.color + '"><i class="fa-solid ' + p.fa + '"></i></div><div class="marker-label">' + p.name + '</div></div>';
          new maptilersdk.Marker({ element: el, anchor: 'top' })
            .setLngLat([p.lng, p.lat])
            .addTo(map);
        } else {
          el.innerHTML = '<div class="marker-pin" style="background:' + p.color + '"><i class="fa-solid ' + p.fa + '"></i></div>';
          var orariHtml = p.orari ? '<div class="popup-orari">&#128336; ' + p.orari + '</div>' : '';
          var popup = new maptilersdk.Popup({ offset: 20 })
            .setHTML('<div class="popup-title">' + p.name + '</div><div class="popup-tipo">' + p.tipo + '</div><div class="popup-addr">&#128205; ' + p.addr + '</div>' + orariHtml);
          new maptilersdk.Marker({ element: el })
            .setLngLat([p.lng, p.lat])
            .setPopup(popup)
            .addTo(map);
        }
      });

      logoPoints.forEach(function(coords) {
        var el = document.createElement('div');
        el.style.cssText = 'cursor:default; pointer-events:none; transform: translateX(8px);';
        var img = document.createElement('img');
        img.src = logoSrc;
        img.style.cssText = 'width:38px; height:auto; filter: drop-shadow(0 1px 3px rgba(0,0,0,0.15)); border: 2px solid #8ec064; border-radius: 8px; background: white; padding: 2px;';
        el.appendChild(img);
        new maptilersdk.Marker({ element: el, anchor: 'left' })
          .setLngLat(coords)
          .addTo(map);
      });
    });
  </script>
